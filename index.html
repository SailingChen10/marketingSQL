<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Meta Tags -->
  <title>MarketingSQL Pro - Master Marketing Analytics SQL | 18 Practice Questions</title>
  <meta name="description" content="Practice real-world Marketing Analytics SQL with 18 hands-on questions. Multi-touch attribution, cohort retention, funnel analysis and more. $49 one-time payment.">
  <meta name="keywords" content="SQL practice, marketing analytics, SQL tutorial, data analyst, marketing SQL, MarketingSQL">
  
  <!-- Open Graph / Social Media -->
  <meta property="og:title" content="MarketingSQL Pro - Marketing Analytics SQL Practice">
  <meta property="og:description" content="18 real-world SQL questions for marketing analysts. Learn cohort analysis, attribution modeling, and funnel optimization.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://marketingsql.com">
  
  <!-- Canonical URL -->
  <link rel="canonical" href="https://marketingsql.com">
  
  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM from CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #1f2937;
    }
    ::-webkit-scrollbar-thumb {
      background: #4b5563;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #6b7280;
    }
    
    /* Smooth transitions */
    * {
      transition: background-color 0.2s ease, color 0.2s ease;
    }
  </style>
</head>

  <!-- Main App Script -->
  <script type="text/babel" src="./app.js"></script>
